name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 0.7.4) — must match tauri.conf.json"
        required: true

jobs:
  sign-and-release:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Install dependencies
        run: pnpm install

      - name: Import Developer ID certificate
        env:
          P12_BASE64: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PASSWORD=$(openssl rand -hex 16)
          KEYCHAIN_PATH=$RUNNER_TEMP/signing.keychain-db

          echo "$P12_BASE64" | base64 --decode -o $RUNNER_TEMP/cert.p12

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 3600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security import "$RUNNER_TEMP/cert.p12" \
            -k "$KEYCHAIN_PATH" \
            -P "$P12_PASSWORD" \
            -T /usr/bin/codesign \
            -A

          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Install Apple intermediate CA so the chain is complete
          curl -s -o /tmp/DeveloperIDG2CA.cer \
            https://www.apple.com/certificateauthority/DeveloperIDG2CA.cer
          security import /tmp/DeveloperIDG2CA.cer -k "$KEYCHAIN_PATH" || true

          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> $GITHUB_ENV
          echo "KEYCHAIN_PASSWORD=$KEYCHAIN_PASSWORD" >> $GITHUB_ENV

      - name: Verify signing identity
        run: security find-identity -v -p codesigning

      - name: Build
        run: pnpm tauri build --target aarch64-apple-darwin

      - name: Sign and notarize
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          VERSION="${{ github.event.inputs.version }}"
          APP_NAME="TailorUsage"
          DMG_PATH="src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/${APP_NAME}_${VERSION}_aarch64.dmg"
          TMP_APP="/tmp/${APP_NAME}.app"

          CERT_HASH=$(security find-identity -v -p codesigning \
            | grep -F "$APPLE_SIGNING_IDENTITY" \
            | head -1 \
            | awk '{print $2}')

          echo "▶ Extracting .app from DMG..."
          MOUNT_OUTPUT=$(hdiutil attach "$DMG_PATH" -readonly -nobrowse 2>&1)
          MOUNT_POINT=$(echo "$MOUNT_OUTPUT" | awk '/Apple_HFS/ {for(i=3;i<=NF;i++) printf $i" "; print ""}' | xargs)
          cp -R "${MOUNT_POINT}/${APP_NAME}.app" "$TMP_APP"
          hdiutil detach "$MOUNT_POINT" -quiet

          echo "▶ Signing .app..."
          codesign --force --deep --options runtime --timestamp \
            --sign "$CERT_HASH" "$TMP_APP"
          codesign --verify --deep --strict "$TMP_APP"

          echo "▶ Recreating DMG..."
          hdiutil create -volname "$APP_NAME" \
            -srcfolder "$TMP_APP" \
            -ov -format UDZO \
            "$DMG_PATH"

          echo "▶ Signing DMG..."
          codesign --force --sign "$CERT_HASH" "$DMG_PATH"

          echo "▶ Notarizing..."
          xcrun notarytool submit "$DMG_PATH" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --wait

          echo "▶ Stapling..."
          xcrun stapler staple "$DMG_PATH"
          xcrun stapler validate "$DMG_PATH"

          spctl --assess --type open --context context:primary-signature -v "$DMG_PATH"

          echo "DMG_PATH=$DMG_PATH" >> $GITHUB_ENV

      - name: Upload to GitHub release
        run: gh release upload "v${{ github.event.inputs.version }}" "$DMG_PATH" --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Clean up keychain
        if: always()
        run: security delete-keychain "$KEYCHAIN_PATH" || true
